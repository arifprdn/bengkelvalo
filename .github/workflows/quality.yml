name: Quality

# Penjaga kualitas tiap push: validasi HTML (W3C) + link/gambar internal
# + budget Lighthouse. Gagal = ada regresi yang harus diperbaiki sebelum
# dianggap beres.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Validasi HTML & aset internal (Nu validator + HTMLProofer)
        uses: anishathalye/proof-html@v2
        with:
          directory: ./dist
          check_css: false
          disable_external: true
          check_favicon: true
          check_opengraph: true
          swap_urls: |
            {"^https://bengkelvalo\\.com/": "/"}

      - name: Budget Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
